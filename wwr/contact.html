<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evercurrent Adventures' Contact Us</title>
    <meta name="description"
      content="Welcome to Evercurrent Adventures, meet our staff and send an email.">
    <meta name="author" content="Esther Enagu-Okpa">
    <link rel="stylesheet" href="styles/rafting.css">
</head>

<body>
    <header>
        <img src="images/z-downriver.jpg" alt="Logo" width="115" height="100">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="trips.html">Trips</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <div class="address">
            <h1 class="company">Evercurrent Adventures</h1>
            <p>123 Budondo Street</p>
            <p>Jinja, Uganda</p>
            <p>+1 999 999 9999</p>
            <p>infoo@evercurrent.com</p>
        </div>
        <div class="flex-container">
            <div class="map">
                <iframe
                  src="https://www.google.com/maps/embed?pb=!1m16!1m12!1m3!1d7981.306136403667!2d33.1629093528925!3d0.48045365090226416!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!2m1!1sWhite%20Nile%20Jinja%20Uganda!5e0!3m2!1sen!2sng!4v1781012932921!5m2!1sen!2sng"
                  width="600" height="450" allowfullscreen="" loading="lazy"
                  referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>

            <form>
                <div class="form-first">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" placeholder="Name" required>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="river@email.com"
                      required>
                </div>
                <div class="purpose">
                    <legend>Message Purpose</legend>
                    <div class="options">
                        <label><input type="radio" id="general" name="purpose" value="general">
                            General
                            Inquiry</label>
                        <label><input type="radio" id="reservation" name="purpose"
                              value="reservation"> Reservation Question</label>
                        <label><input type="radio" id="suggestion" name="purpose"
                              value="suggestion"> Website
                            Suggestion</label>
                    </div>
                </div>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="4" placeholder="Type here"></textarea>
                <div class="newsletter">
                    <label><input type="checkbox" id="subscribe" name="subscribe">Please subscribe
                        me to the monthly newsletter</label>
                </div>
                <button type="submit">Get in Touch</button>
            </form>
        </div>

        <section class="profile">
            <figure>
                <img src="images/roni.jpg" alt="Roni E.">
                <figcaption>Owner</figcaption>
            </figure>
            <figure>
                <img src="images/hassani.jpg" alt="Hassani M.">
                <figcaption>Chief Accountant</figcaption>
            </figure>
            <figure>
                <img src="images/alvara.jpg" alt="Alvara B.">
                <figcaption>Graphic Designer</figcaption>
            </figure>
        </section>
    </main>
    <footer>
        <p>©2026 | Rafting | Esther Enagu</p>
        <nav class="socialmedia">
            <a href="https://facebook.com">
                <img src="images/facebook.jpg" alt="Facebook Icon" width="60" height="60">
            </a>
            <a href="https://linkedin.com">
                <img src="images/linkedin.png" alt="LinkedIn Icon" width="60" height="60">
            </a>
            <a href="https://instagram.com">
                <img src="images/instagram.jpg" alt="Instagram Icon" width="60" height="60">
            </a>
        </nav>
    </footer>
</body>

</html>
